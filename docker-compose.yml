services:
  postgres:
    image: postgres:17-alpine
    container_name: corporate-payments-postgres
    environment:
      POSTGRES_DB: corporate_payments
      POSTGRES_USER: corporate_payments
      POSTGRES_PASSWORD: corporate_payments
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corporate_payments -d corporate_payments"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
